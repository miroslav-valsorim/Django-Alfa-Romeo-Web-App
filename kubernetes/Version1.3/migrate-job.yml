apiVersion: batch/v1
kind: Job
metadata:
  name: django-migrate
  namespace: alfa-romeo
  labels:
    app: django-migrate
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: django-migrate
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-db
        image: busybox:1.35
        command:
        - sh
        - -c
        - |
          until nc -z alfa-romeo-db 5432; do
            echo "Waiting for database..."
            sleep 2
          done
          echo "Database ready"
      containers:
      - name: migrate
        image: miroslavvalsorim/alfawebapp:latest
        imagePullPolicy: Always
        command: ["python", "manage.py", "migrate", "--noinput"]
        envFrom:
        - configMapRef:
            name: django-config
        - secretRef:
            name: django-secret
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
